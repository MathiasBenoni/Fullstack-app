{% extends "base.html" %}

{% block content %}

{% for row in rows %}
<div class="card">
    <form action="/approved" method="post">
        <div class="field">
            <h1>{{ row[0] }}</h1>
            <h2>{{ row[1] }}</h2>
        </div>
        <input type="hidden" name="username" value="{{ row[0] }}">
        <input type="hidden" name="date" value="{{ row[1] }}">
        <button type="submit">Approve</button>
    </form>
</div>
{% endfor %}

{% endblock %}
